<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login - Estação Verde</title>
<style>
body{font-family:Arial;background:#0f172a;color:white;display:flex;justify-content:center;align-items:center;height:100vh}
.card{background:#1e293b;padding:30px;border-radius:10px;width:300px}
input{width:100%;padding:10px;margin:10px 0;border-radius:5px;border:none}
button{width:100%;padding:12px;background:#22c55e;color:white;border:none;border-radius:5px;font-weight:bold;cursor:pointer}
</style>
</head>
<body>
<div class="card">
<h2>🌿 Estação Verde</h2>
<input type="text" id="usuario" placeholder="Usuário">
<input type="password" id="senha" placeholder="Senha">
<button onclick="entrar()">Entrar</button>
</div>
<script>
function entrar(){
let user=document.getElementById("usuario").value
let pass=document.getElementById("senha").value
if(user==="Nerys"&&pass==="2020"){
localStorage.setItem("logado","sim")
window.location.href="home.html"
}else{alert("Usuário ou senha incorretos")}
}
</script>
</body>
</html>
