<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Estação Verde - Sistema</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{
    margin:0;
    font-family:Arial;
    background:linear-gradient(135deg,#0f172a,#1e293b);
    color:white;
}

header{
    padding:15px;
    text-align:center;
    font-size:20px;
    background:linear-gradient(90deg,#065f46,#16a34a);
}

.container{padding:15px}

input{
    width:100%;
    padding:10px;
    margin:5px 0;
    border:none;
    border-radius:8px;
}

button{
    width:100%;
    padding:12px;
    margin:5px 0;
    border:none;
    border-radius:10px;
    font-weight:bold;
    cursor:pointer;
    color:white;
}

/* Botões menu */
.menu button:nth-child(1){
    background:linear-gradient(90deg,#16a34a,#22c55e);
}
.menu button:nth-child(2){
    background:linear-gradient(90deg,#2563eb,#3b82f6);
}
.menu button:nth-child(3){
    background:linear-gradient(90deg,#f59e0b,#f97316);
}

.btn-green{background:linear-gradient(90deg,#16a34a,#22c55e);}
.btn-blue{background:linear-gradient(90deg,#2563eb,#3b82f6);}
.btn-red{background:linear-gradient(90deg,#dc2626,#ef4444);}

.card{
    background:#1e293b;
    padding:10px;
    border-radius:10px;
    margin:10px 0;
}

.hidden{display:none}
</style>
</head>
<body>

<header>🌿 Estação Verde - Sistema Caixa</header>

<div class="container">

<!-- MENU -->
<div class="menu">
<button onclick="mostrarTela('estoque')">📦 Estoque</button>
<button onclick="mostrarTela('vendas')">💰 Vendas</button>
<button onclick="mostrarTela('historico')">📜 Histórico</button>
</div>

<!-- ESTOQUE -->
<div id="estoque" class="hidden">

<h3>Cadastro de Produto</h3>
<input type="text" id="nomeProduto" placeholder="Nome do Produto">
<input type="number" id="precoProduto" placeholder="Preço">
<input type="number" id="qtdProduto" placeholder="Quantidade">
<button class="btn-green" onclick="salvarProduto()">Salvar Produto</button>

<div id="listaProdutos"></div>
</div>

<!-- VENDAS -->
<div id="vendas" class="hidden">

<input type="text" id="buscarProduto" placeholder="Buscar produto" onkeyup="buscar()">
<div id="resultadoBusca"></div>

<h3>Total: R$ <span id="totalVenda">0.00</span></h3>

<button class="btn-blue" onclick="finalizarVenda()">Finalizar Venda</button>
<button class="btn-green" onclick="gerarPDF()">Gerar PDF do Dia</button>

</div>

<!-- HISTÓRICO -->
<div id="historico" class="hidden">
<div id="listaHistorico"></div>
</div>

</div>

<script>

let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let historico = JSON.parse(localStorage.getItem("historico")) || [];
let carrinho = [];
let total = 0;

function salvarLocal(){
localStorage.setItem("produtos",JSON.stringify(produtos));
localStorage.setItem("historico",JSON.stringify(historico));
}

function mostrarTela(tela){
document.getElementById("estoque").classList.add("hidden");
document.getElementById("vendas").classList.add("hidden");
document.getElementById("historico").classList.add("hidden");
document.getElementById(tela).classList.remove("hidden");
mostrarProdutos();
mostrarHistorico();
}

function salvarProduto(){
let nome = nomeProduto.value;
let preco = parseFloat(precoProduto.value);
let qtd = parseInt(qtdProduto.value);

produtos.push({nome,preco,qtd});
salvarLocal();
mostrarProdutos();

nomeProduto.value="";
precoProduto.value="";
qtdProduto.value="";
}

function mostrarProdutos(){
listaProdutos.innerHTML="";
produtos.forEach((p,i)=>{
listaProdutos.innerHTML+=`
<div class="card">
<b>${p.nome}</b><br>
R$ ${p.preco} | Estoque: ${p.qtd}
<button class="btn-green" onclick="alterarEstoque(${i},1)">➕</button>
<button class="btn-red" onclick="alterarEstoque(${i},-1)">➖</button>
<button class="btn-blue" onclick="alterarPreco(${i})">Alterar Preço</button>
</div>`;
});
}

function alterarEstoque(i,valor){
produtos[i].qtd+=valor;
if(produtos[i].qtd<0)produtos[i].qtd=0;
salvarLocal();
mostrarProdutos();
}

function alterarPreco(i){
let novo = prompt("Novo preço:");
if(novo){
produtos[i].preco=parseFloat(novo);
salvarLocal();
mostrarProdutos();
}
}

function buscar(){
let termo = buscarProduto.value.toLowerCase();
resultadoBusca.innerHTML="";
produtos.forEach((p,i)=>{
if(p.nome.toLowerCase().includes(termo)){
resultadoBusca.innerHTML+=`
<div class="card">
${p.nome} - R$ ${p.preco}
<button class="btn-green" onclick="addCarrinho(${i})">Adicionar</button>
</div>`;
}
});
}

function addCarrinho(i){
if(produtos[i].qtd>0){
carrinho.push(produtos[i]);
produtos[i].qtd--;
total+=produtos[i].preco;
totalVenda.innerText=total.toFixed(2);
salvarLocal();
mostrarProdutos();
}else{
alert("Sem estoque");
}
}

function finalizarVenda(){
if(carrinho.length==0)return;

let data=new Date();
historico.push({
data:data.toLocaleDateString(),
hora:data.toLocaleTimeString(),
total:total
});

salvarLocal();
mostrarHistorico();

carrinho=[];
total=0;
totalVenda.innerText="0.00";
alert("Venda finalizada!");
}

function mostrarHistorico(){
listaHistorico.innerHTML="";
historico.forEach(v=>{
listaHistorico.innerHTML+=`
<div class="card">
Data: ${v.data}<br>
Hora: ${v.hora}<br>
Total: R$ ${v.total.toFixed(2)}
</div>`;
});
}

function gerarPDF(){
const { jsPDF } = window.jspdf;
let doc=new jsPDF();
let texto="Relatório do Dia\n\n";
let totalDia=0;

let hoje=new Date().toLocaleDateString();
historico.forEach(v=>{
if(v.data===hoje){
texto+=`Hora: ${v.hora} - R$ ${v.total}\n`;
totalDia+=v.total;
}
});

texto+=`\nTotal do Dia: R$ ${totalDia.toFixed(2)}`;
doc.text(texto,10,10);
doc.save("relatorio.pdf");
}

</script>

</body>
</html>
