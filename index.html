<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Caixa Estação Verde</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
font-family: Arial;
background:#0f172a;
color:white;
padding:20px;
}
.card{
background:#1e293b;
padding:20px;
border-radius:10px;
margin-bottom:20px;
}
input{
width:100%;
padding:10px;
margin:5px 0;
border-radius:5px;
border:none;
}
button{
width:100%;
padding:12px;
background:#22c55e;
color:white;
border:none;
border-radius:5px;
font-weight:bold;
cursor:pointer;
}
button:hover{
opacity:0.9;
}
</style>
</head>

<body>

<h1>🌿 Caixa Estação Verde</h1>

<div class="card">
<h2>Cadastrar Produto</h2>
<input type="text" id="nome" placeholder="Nome do produto">
<input type="number" id="preco" placeholder="Preço">
<input type="number" id="estoque" placeholder="Estoque">
<button onclick="cadastrarProduto()">Salvar Produto</button>
</div>

<div class="card">
<h2>Lista de Produtos</h2>
<div id="listaProdutos"></div>
</div>

<script>

const SUPABASE_URL = "https://ycxfeztfhffgyrmeyira.supabase.co"

const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljeGZlenRmaGZmZ3lybWV5aXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzE3MDQsImV4cCI6MjA4ODE0NzcwNH0.MTf_fzLganV20cMovHrrLwOOxfE5y3UlXyyDVst4BnE"

const { createClient } = supabase
const supabaseClient = createClient(SUPABASE_URL, SUPABASE_KEY)

async function cadastrarProduto(){

let nome = document.getElementById("nome").value
let preco = document.getElementById("preco").value
let estoque = document.getElementById("estoque").value

if(!nome || !preco || !estoque){
alert("Preencha todos os campos")
return
}

const { error } = await supabaseClient
.from("produtos")
.insert([{ nome: nome, preco: Number(preco), estoque: Number(estoque) }])

if(error){
alert("Erro: " + error.message)
console.log(error)
return
}

alert("Produto salvo com sucesso!")

document.getElementById("nome").value = ""
document.getElementById("preco").value = ""
document.getElementById("estoque").value = ""

carregarProdutos()
}

async function carregarProdutos(){

const { data, error } = await supabaseClient
.from("produtos")
.select("*")
.order("id", { ascending: false })

if(error){
console.log(error)
return
}

let lista = document.getElementById("listaProdutos")
lista.innerHTML = ""

data.forEach(produto => {
lista.innerHTML += `
<p>
<strong>${produto.nome}</strong><br>
Preço: R$ ${produto.preco}<br>
Estoque: ${produto.estoque}
</p>
<hr>
`
})

}

carregarProdutos()

</script>

</body>
</html>
