<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Estação Verde - Sistema</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<style>
body{font-family:Arial;background:#f4f4f4;margin:0;padding:0}
.container{padding:20px}
.hidden{display:none}
button{padding:10px;border:none;border-radius:8px;margin:5px;cursor:pointer}
.btn1{background:linear-gradient(45deg,#2ecc71,#27ae60);color:white}
.btn2{background:linear-gradient(45deg,#3498db,#2980b9);color:white}
.btn3{background:linear-gradient(45deg,#e74c3c,#c0392b);color:white}
input{padding:8px;margin:5px;width:200px}
.card{background:white;padding:15px;margin:10px 0;border-radius:10px}
</style>
</head>
<body>

<div class="container" id="login">
<h2>🔐 Login</h2>
<input id="email" placeholder="Email">
<input id="senha" type="password" placeholder="Senha">
<button class="btn1" onclick="login()">Entrar</button>
</div>

<div id="sistema" class="hidden container">

<h2>🌿 Estação Verde - Caixa</h2>

<button class="btn1" onclick="abrirCaixa()">🔓 Abrir Caixa</button>
<button class="btn3" onclick="fecharCaixa()">🔒 Fechar Caixa</button>

<h3>💰 Total Caixa: R$ <span id="totalCaixa">0.00</span></h3>

<hr>

<h3>📦 Estoque</h3>
<input id="nomeProduto" placeholder="Nome">
<input id="precoProduto" placeholder="Preço">
<input id="quantProduto" placeholder="Quantidade">
<button class="btn2" onclick="addProduto()">Adicionar</button>

<div id="listaEstoque"></div>

<hr>

<h3>🛒 Venda</h3>
<input id="buscarProduto" placeholder="Buscar produto">
<button onclick="buscar()">Buscar</button>

<div id="resultadoBusca"></div>

<h3>Total Venda: R$ <span id="totalVenda">0.00</span></h3>
<button class="btn1" onclick="finalizarVenda()">Finalizar Venda</button>

<hr>

<h3>📊 Histórico</h3>
<div id="historico"></div>

</div>

<script>
const supabaseUrl = "https://ycxfeztfhffgyrmeyira.supabase.co";
const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljeGZlenRmaGZmZ3lybWV5aXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzE3MDQsImV4cCI6MjA4ODE0NzcwNH0.MTf_fzLganV20cMovHrrLwOOxfE5y3UlXyyDVst4BnE";
const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);

let vendaAtual = [];
let caixaAberto = false;

async function login(){
const {data,error} = await supabase.auth.signInWithPassword({
email:email.value,
password:senha.value
});
if(error){alert("Erro login");return;}
login.style.display="none";
sistema.classList.remove("hidden");
carregarEstoque();
carregarHistorico();
}

async function abrirCaixa(){
await supabase.from("caixa").insert({status:"aberto",total:0});
caixaAberto=true;
alert("Caixa Aberto");
}

async function fecharCaixa(){
await supabase.from("caixa").update({status:"fechado"}).eq("status","aberto");
caixaAberto=false;
alert("Caixa Fechado");
}

async function addProduto(){
await supabase.from("produtos").insert({
nome:nomeProduto.value,
preco:precoProduto.value,
quantidade:quantProduto.value
});
carregarEstoque();
}

async function carregarEstoque(){
let {data} = await supabase.from("produtos").select("*");
listaEstoque.innerHTML="";
data.forEach(p=>{
listaEstoque.innerHTML+=`
<div class="card">
${p.nome} - R$ ${p.preco} - Qtd:${p.quantidade}
<button onclick="editar(${p.id})">Editar</button>
<button onclick="remover(${p.id})">Remover</button>
</div>`;
});
}

async function editar(id){
let novo = prompt("Nova quantidade:");
await supabase.from("produtos").update({quantidade:novo}).eq("id",id);
carregarEstoque();
}

async function remover(id){
await supabase.from("produtos").delete().eq("id",id);
carregarEstoque();
}

async function buscar(){
let {data} = await supabase.from("produtos")
.select("*")
.ilike("nome","%"+buscarProduto.value+"%");
resultadoBusca.innerHTML="";
data.forEach(p=>{
resultadoBusca.innerHTML+=`
<div class="card">
${p.nome} - R$ ${p.preco}
<button onclick="addVenda(${p.id},${p.preco})">Adicionar</button>
</div>`;
});
}

function addVenda(id,preco){
if(!caixaAberto){alert("Caixa fechado");return;}
vendaAtual.push(preco);
atualizarTotal();
}

function atualizarTotal(){
let total = vendaAtual.reduce((a,b)=>a+b,0);
totalVenda.innerText=total.toFixed(2);
}

async function finalizarVenda(){
if(vendaAtual.length==0){alert("Sem produto");return;}
let total = vendaAtual.reduce((a,b)=>a+b,0);

await supabase.from("vendas").insert({
total:total
});

let {data} = await supabase.from("caixa").select("*").eq("status","aberto").single();
await supabase.from("caixa").update({
total:data.total + total
}).eq("id",data.id);

totalCaixa.innerText=(data.total + total).toFixed(2);

gerarPDF(total);

vendaAtual=[];
atualizarTotal();
carregarHistorico();
}

async function carregarHistorico(){
let {data} = await supabase.from("vendas").select("*").order("id",{ascending:false});
historico.innerHTML="";
data.forEach(v=>{
historico.innerHTML+=`
<div class="card">
Venda #${v.id} - R$ ${v.total}
</div>`;
});
}

function gerarPDF(total){
const { jsPDF } = window.jspdf;
const doc = new jsPDF();
doc.text("Estação Verde",20,20);
doc.text("Total: R$ "+total,20,30);
doc.save("comprovante.pdf");
}

</script>
</body>
</html>
