<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistema Caixa - Estação Verde</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
body{
    font-family: Arial;
    margin:0;
    background:#0f172a;
    color:white;
}
header{
    background:#065f46;
    padding:15px;
    text-align:center;
    font-size:20px;
}
.container{padding:15px}
input,button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:5px;
    border:none;
}
button{cursor:pointer;font-weight:bold}
.btn-green{background:#16a34a;color:white}
.btn-red{background:#dc2626;color:white}
.btn-blue{background:#2563eb;color:white}
.card{
    background:#1e293b;
    padding:10px;
    border-radius:8px;
    margin:10px 0;
}
.hidden{display:none}
</style>
</head>
<body>

<header>🌿 Estação Verde - Sistema Caixa</header>

<div class="container" id="login">
<h3>Login</h3>
<input type="text" id="user" placeholder="Usuário">
<input type="password" id="pass" placeholder="Senha">
<button class="btn-green" onclick="entrar()">Entrar</button>
</div>

<div class="container hidden" id="sistema">

<h3>📦 Estoque</h3>

<input type="text" id="nomeProduto" placeholder="Nome do Produto">
<input type="number" id="precoProduto" placeholder="Preço">
<input type="number" id="qtdProduto" placeholder="Quantidade">
<button class="btn-green" onclick="salvarProduto()">Salvar Produto</button>

<div id="listaProdutos"></div>

<hr>

<h3>💰 Vendas</h3>

<input type="text" id="buscarProduto" placeholder="Buscar produto pelo nome" onkeyup="buscar()">
<div id="resultadoBusca"></div>

<h4>Total: R$ <span id="totalVenda">0.00</span></h4>
<button class="btn-blue" onclick="finalizarVenda()">Finalizar Venda</button>
<button class="btn-green" onclick="gerarPDF()">Gerar PDF do Dia</button>

<hr>

<h3>📜 Histórico</h3>
<div id="historico"></div>

</div>

<script>
let produtos = JSON.parse(localStorage.getItem("produtos")) || [];
let historico = JSON.parse(localStorage.getItem("historico")) || [];
let carrinho = [];
let total = 0;

function salvarLocal(){
localStorage.setItem("produtos", JSON.stringify(produtos));
localStorage.setItem("historico", JSON.stringify(historico));
}

function entrar(){
if(user.value==="viveiro" && pass.value==="2020"){
login.classList.add("hidden");
sistema.classList.remove("hidden");
mostrarProdutos();
mostrarHistorico();
}else{
alert("Login incorreto");
}
}

function salvarProduto(){
let nome = nomeProduto.value;
let preco = parseFloat(precoProduto.value);
let qtd = parseInt(qtdProduto.value);

produtos.push({nome,preco,qtd});
salvarLocal();
mostrarProdutos();

nomeProduto.value="";
precoProduto.value="";
qtdProduto.value="";
}

function mostrarProdutos(){
listaProdutos.innerHTML="";
produtos.forEach((p,index)=>{
listaProdutos.innerHTML+=`
<div class="card">
<b>${p.nome}</b><br>
R$ ${p.preco} | Estoque: ${p.qtd}
<button class="btn-green" onclick="alterarEstoque(${index},1)">➕</button>
<button class="btn-red" onclick="alterarEstoque(${index},-1)">➖</button>
<button class="btn-blue" onclick="alterarPreco(${index})">Alterar Preço</button>
</div>`;
});
}

function alterarEstoque(index,valor){
produtos[index].qtd+=valor;
if(produtos[index].qtd<0)produtos[index].qtd=0;
salvarLocal();
mostrarProdutos();
}

function alterarPreco(index){
let novo = prompt("Novo preço:");
if(novo){
produtos[index].preco=parseFloat(novo);
salvarLocal();
mostrarProdutos();
}
}

function buscar(){
let termo = buscarProduto.value.toLowerCase();
resultadoBusca.innerHTML="";
produtos.forEach((p,index)=>{
if(p.nome.toLowerCase().includes(termo)){
resultadoBusca.innerHTML+=`
<div class="card">
${p.nome} - R$ ${p.preco}
<button class="btn-green" onclick="addCarrinho(${index})">Adicionar</button>
</div>`;
}
});
}

function addCarrinho(index){
if(produtos[index].qtd>0){
carrinho.push(produtos[index]);
produtos[index].qtd--;
total+=produtos[index].preco;
totalVenda.innerText=total.toFixed(2);
salvarLocal();
mostrarProdutos();
}else{
alert("Sem estoque");
}
}

function finalizarVenda(){
if(carrinho.length==0)return;

let data = new Date();
historico.push({
data:data.toLocaleDateString(),
hora:data.toLocaleTimeString(),
total:total
});

salvarLocal();
mostrarHistorico();

carrinho=[];
total=0;
totalVenda.innerText="0.00";
alert("Venda finalizada!");
}

function mostrarHistorico(){
historico.innerHTML="";
historico.forEach(v=>{
historico.innerHTML+=`
<div class="card">
Data: ${v.data} <br>
Hora: ${v.hora} <br>
Total: R$ ${v.total.toFixed(2)}
</div>`;
});
}

function gerarPDF(){
const { jsPDF } = window.jspdf;
let doc = new jsPDF();

let hoje = new Date().toLocaleDateString();
let vendasHoje = historico.filter(v=>v.data===hoje);

let totalDia = 0;
let texto = "Relatório do Dia\n\n";

vendasHoje.forEach(v=>{
texto+=`Data: ${v.data} Hora: ${v.hora} Total: R$ ${v.total}\n`;
totalDia+=v.total;
});

texto+=`\nTotal do Dia: R$ ${totalDia.toFixed(2)}`;

doc.text(texto,10,10);
doc.save("relatorio-dia.pdf");
}
</script>

</body>
</html>
