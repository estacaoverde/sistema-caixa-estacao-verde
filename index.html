<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Estação Verde - Sistema Profissional</title>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<style>
body{
  font-family: Arial;
  background:#eef5ee;
  padding:15px;
  margin:0;
}
h1{
  color:#1b5e20;
}
.section{
  background:white;
  padding:15px;
  margin-bottom:20px;
  border-radius:10px;
  box-shadow:0 2px 6px rgba(0,0,0,0.1);
}
input{
  padding:8px;
  margin:5px 0;
  width:100%;
  border-radius:6px;
  border:1px solid #ccc;
}
button{
  padding:10px;
  margin-top:8px;
  width:100%;
  border:none;
  border-radius:6px;
  background:#2e7d32;
  color:white;
  font-weight:bold;
}
button:hover{
  background:#1b5e20;
}
.item{
  display:flex;
  justify-content:space-between;
  margin:6px 0;
}
.total{
  font-size:18px;
  font-weight:bold;
  margin-top:10px;
}
</style>
</head>
<body>

<h1>🌿 Estação Verde</h1>

<div class="section">
<h3>📦 Cadastrar Produto</h3>
<input id="nome" placeholder="Nome do Produto">
<input id="preco" type="number" placeholder="Preço">
<input id="quantidade" type="number" placeholder="Quantidade">
<button onclick="salvarProduto()">Salvar Produto</button>
</div>

<div class="section">
<h3>🛒 Nova Venda</h3>
<input id="buscar" placeholder="Buscar produto">
<button onclick="buscarProduto()">Buscar</button>

<div id="resultado"></div>

<div class="total">Total: R$ <span id="totalVenda">0.00</span></div>
<button onclick="finalizarVenda()">Finalizar Venda</button>
</div>

<div class="section">
<h3>📊 Histórico</h3>
<div id="historico"></div>
<div class="total">Total vendido hoje: R$ <span id="totalDia">0.00</span></div>
</div>

<script>

const supabase = window.supabase.createClient(
"https://ycxfeztfhffgyrmeyira.supabase.co",
"eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InljeGZlenRmaGZmZ3lybWV5aXJhIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI1NzE3MDQsImV4cCI6MjA4ODE0NzcwNH0.MTf_fzLganV20cMovHrrLwOOxfE5y3UlXyyDVst4BnE"
);

let carrinho = [];

async function salvarProduto(){
if(!nome.value) return alert("Digite o nome");

await supabase.from("produtos").insert({
nome: nome.value,
preco: Number(preco.value),
quantidade: Number(quantidade.value)
});

nome.value="";
preco.value="";
quantidade.value="";

alert("Produto salvo!");
}

async function buscarProduto(){

let { data } = await supabase
.from("produtos")
.select("*")
.ilike("nome","%"+buscar.value+"%");

resultado.innerHTML="";

data.forEach(p=>{
resultado.innerHTML+=`
<div class="item">
<span>${p.nome} (Estoque: ${p.quantidade})</span>
<button onclick="addCarrinho(${p.id}, '${p.nome}', ${p.preco}, ${p.quantidade})">+</button>
</div>`;
});
}

function addCarrinho(id,nome,preco,estoque){
if(estoque<=0) return alert("Sem estoque");

carrinho.push({id,nome,preco});
atualizarTotal();
}

function atualizarTotal(){
let total = carrinho.reduce((a,b)=>a+b.preco,0);
totalVenda.innerText = total.toFixed(2);
}

async function finalizarVenda(){

if(carrinho.length==0) return alert("Carrinho vazio");

let total = carrinho.reduce((a,b)=>a+b.preco,0);

/* Atualiza estoque */
for(let item of carrinho){
let { data } = await supabase
.from("produtos")
.select("quantidade")
.eq("id",item.id)
.single();

await supabase
.from("produtos")
.update({quantidade:data.quantidade-1})
.eq("id",item.id);
}

/* Salva venda */
await supabase
.from("vendas")
.insert({
itens: carrinho,
total: total
});

carrinho=[];
atualizarTotal();
buscar.value="";
resultado.innerHTML="";

alert("Venda finalizada!");

carregarHistorico();
}

async function carregarHistorico(){

let { data } = await supabase
.from("vendas")
.select("*")
.order("id",{ascending:false});

historico.innerHTML="";
let totalHoje = 0;

data.forEach(v=>{
historico.innerHTML+=`
<div class="item">
<span>R$ ${v.total} - ${new Date(v.created_at).toLocaleString()}</span>
</div>`;
totalHoje += Number(v.total);
});

totalDia.innerText = totalHoje.toFixed(2);
}

carregarHistorico();

</script>

</body>
</html>
